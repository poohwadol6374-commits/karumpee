<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase History | Better Day Agency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root,[data-theme="dark"]{--bg:#0a0a0a;--bg2:#111;--card:rgba(20,20,20,.85);--card-h:rgba(30,30,30,.95);--nav-bg:rgba(10,10,10,.82);--brd:rgba(255,255,255,.06);--brd2:rgba(255,255,255,.1);--tx:#f5f5f7;--tx2:#b0b0b5;--tx3:#6e6e73;--ac:#e63946;--ac-h:#c1121f;--ac-s:rgba(230,57,70,.1);--ac-g:rgba(230,57,70,.2);--green:#30d158;--orange:#ff9f0a;color-scheme:dark}
        [data-theme="light"]{--bg:#fff;--bg2:#f5f5f7;--card:rgba(255,255,255,.92);--card-h:rgba(250,248,248,1);--nav-bg:rgba(255,255,255,.82);--brd:rgba(0,0,0,.06);--brd2:rgba(0,0,0,.1);--tx:#1a1a1a;--tx2:#555;--tx3:#999;--ac:#c1121f;--ac-h:#a00d1a;--ac-s:rgba(193,18,31,.06);--ac-g:rgba(193,18,31,.12);--green:#2d8a4e;--orange:#d4700a;color-scheme:light}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter','Prompt',-apple-system,sans-serif;background:var(--bg);color:var(--tx);line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}
        a{color:inherit;text-decoration:none}h1,h2,h3,h4{font-family:'Prompt',sans-serif;font-weight:600;letter-spacing:-.02em}
        .wrap{display:flex;min-height:100vh}

        /* Sidebar */
        .side{width:260px;background:var(--bg);border-right:1px solid var(--brd);position:fixed;height:100vh;display:flex;flex-direction:column;padding:1.5rem;z-index:100;transition:background .4s}
        .side-logo{font-family:'Prompt',sans-serif;font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:.5rem;margin-bottom:2rem;padding:.5rem}.side-logo .dot{color:var(--ac)}
        .side-nav{display:flex;flex-direction:column;gap:.25rem;flex:1}
        .side-nav a{padding:.7rem 1rem;border-radius:12px;color:var(--tx3);display:flex;align-items:center;gap:.75rem;font-size:.9rem;font-weight:500;transition:all .25s}
        .side-nav a svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
        .side-nav a:hover{background:var(--ac-s);color:var(--tx)}
        .side-nav a.active{background:var(--ac-s);color:var(--ac);font-weight:600}.side-nav a.active svg{stroke:var(--ac)}
        .side-bottom{border-top:1px solid var(--brd);padding-top:1rem;display:flex;flex-direction:column;gap:.25rem}
        .side-bottom a{padding:.7rem 1rem;border-radius:12px;color:var(--tx3);display:flex;align-items:center;gap:.75rem;font-size:.9rem;font-weight:500;transition:all .25s}
        .side-bottom a svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
        .side-bottom a:hover{background:rgba(230,57,70,.06);color:var(--ac)}

        .main{flex:1;margin-left:260px;padding:2rem 3rem 4rem;max-width:1100px}
        .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2.5rem}
        .topbar h1{font-size:1.8rem;margin-bottom:.25rem}.topbar p{color:var(--tx3);font-size:.95rem}
        .topbar-right{display:flex;align-items:center;gap:.75rem}
        .theme-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--brd);background:var(--card);color:var(--tx2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s}
        .theme-btn:hover{background:var(--ac-s);color:var(--ac);border-color:var(--ac)}
        [data-theme="dark"] .ic-sun{display:block}[data-theme="dark"] .ic-moon{display:none}
        [data-theme="light"] .ic-sun{display:none}[data-theme="light"] .ic-moon{display:block}
        .avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid var(--brd)}

        /* Stats */
        .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem}
        .stat{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:1.25rem;transition:all .35s}
        .stat:hover{border-color:var(--brd2);transform:translateY(-3px)}
        .stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:.75rem}
        .stat-icon svg{width:18px;height:18px}
        .stat-icon.red{background:var(--ac-s);color:var(--ac)}.stat-icon.green{background:rgba(48,209,88,.1);color:var(--green)}.stat-icon.blue{background:rgba(41,151,255,.1);color:#2997ff}
        .stat-num{font-family:'Prompt',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:.1rem}.stat-label{font-size:.75rem;color:var(--tx3)}

        /* Table-like list */
        .h-list{display:flex;flex-direction:column;gap:.75rem;margin-bottom:2rem}
        .h-item{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:1.25rem 1.5rem;display:flex;align-items:center;gap:1.25rem;transition:all .35s ease}
        .h-item:hover{border-color:var(--brd2);transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.12)}
        .h-thumb{width:64px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0}
        .h-info{flex:1;min-width:0}
        .h-title{font-size:.92rem;font-weight:600;margin-bottom:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .h-meta{font-size:.75rem;color:var(--tx3);display:flex;gap:.75rem;flex-wrap:wrap}
        .h-amount{font-family:'Prompt',sans-serif;font-weight:700;font-size:1rem;white-space:nowrap}
        .h-status{padding:.2rem .6rem;border-radius:980px;font-size:.65rem;font-weight:700;white-space:nowrap}
        .h-status.success{background:rgba(48,209,88,.1);color:var(--green);border:1px solid rgba(48,209,88,.2)}
        .h-status.pending{background:rgba(255,159,10,.1);color:var(--orange);border:1px solid rgba(255,159,10,.2)}
        .h-actions{display:flex;gap:.5rem;flex-shrink:0}
        .h-btn{padding:.4rem .8rem;border-radius:10px;font-family:inherit;font-size:.75rem;font-weight:600;border:1px solid var(--brd);background:transparent;color:var(--tx2);cursor:pointer;transition:all .3s;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem}
        .h-btn:hover{background:var(--ac-s);border-color:var(--ac);color:var(--ac)}
        .h-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}

        .empty{text-align:center;padding:4rem 1rem;color:var(--tx3)}
        .empty svg{width:48px;height:48px;stroke:var(--tx3);fill:none;stroke-width:1;opacity:.3;margin-bottom:.75rem}
        .empty a{color:var(--ac);font-weight:600}

        .rv{opacity:0;transform:translateY(25px);transition:opacity .6s cubic-bezier(.16,1,.3,1),transform .6s cubic-bezier(.16,1,.3,1)}.rv.show{opacity:1;transform:translateY(0)}
        .d1{transition-delay:.05s}.d2{transition-delay:.1s}.d3{transition-delay:.15s}

        .mobile-bar{display:none;position:fixed;top:0;left:0;right:0;z-index:200;padding:.75rem 1.25rem;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--brd);justify-content:space-between;align-items:center}
        .mob-logo{font-family:'Prompt',sans-serif;font-size:1.2rem;font-weight:700}.mob-logo .dot{color:var(--ac)}
        @media(max-width:900px){.side{display:none}.main{margin-left:0;padding:5rem 1.25rem 3rem}.mobile-bar{display:flex}.stats{grid-template-columns:1fr}.h-item{flex-wrap:wrap}.h-thumb{display:none}.h-actions{width:100%;margin-top:.5rem}}
        ::selection{background:var(--ac-g);color:#fff}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}
    </style>
</head>
<body>
    <div class="mobile-bar">
        <span class="mob-logo">BetterDay<span class="dot">.</span></span>
        <div style="display:flex;gap:.5rem;align-items:center">
            <button class="theme-btn" onclick="toggleTheme()"><svg class="ic-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg><svg class="ic-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
            <img class="avatar" src="https://i.pravatar.cc/100?img=11" alt="Profile">
        </div>
    </div>
    <div class="wrap">
        <aside class="side">
            <a href="index.html" class="side-logo"><svg width="24" height="24" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="8" fill="url(#hLG)"/><path d="M8 14L12 18L20 10" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="hLG" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#e63946"/><stop offset="1" stop-color="#c1121f"/></linearGradient></defs></svg>BetterDay<span class="dot">.</span></a>
            <nav class="side-nav">
                <a href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>Dashboard</a>
                <a href="my-courses.html"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>My Courses</a>
                <a href="certificates.html"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>Certificates</a>
                <a href="history.html" class="active"><svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><path d="M1 10h22"/></svg>Purchase History</a>
                <a href="settings.html"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a>
            </nav>
            <div class="side-bottom"><a href="#" onclick="localStorage.removeItem('isLoggedIn');location.href='index.html'"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a></div>
        </aside>

        <main class="main">
            <header class="topbar rv d1">
                <div><h1>ประวัติการซื้อ 💳</h1><p>รายการคอร์สที่คุณซื้อทั้งหมด</p></div>
                <div class="topbar-right">
                    <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme"><svg class="ic-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg><svg class="ic-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
                    <img class="avatar" src="https://i.pravatar.cc/100?img=11" alt="Profile">
                </div>
            </header>

            <div class="stats" id="hStats"></div>
            <div class="sec-head rv d2"><h2>รายการทั้งหมด</h2></div>
            <div id="hContent"></div>
        </main>
    </div>

    <script src="course-data.js"></script>
    <script>
        const root = document.documentElement;
        root.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
        function toggleTheme(){const n=root.getAttribute('data-theme')==='dark'?'light':'dark';root.setAttribute('data-theme',n);localStorage.setItem('theme',n)}

        const purchased = getPurchased();
        const totalSpent = purchased.reduce((s, id) => s + (COURSES[id]?.price || 0), 0);
        const totalSaved = purchased.reduce((s, id) => { const c = COURSES[id]; return s + (c ? c.oldPrice - c.price : 0); }, 0);

        // Stats
        document.getElementById('hStats').innerHTML = `
            <div class="stat rv d1"><div class="stat-icon red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="4" width="22" height="16" rx="2"/><path d="M1 10h22"/></svg></div><div class="stat-num">${purchased.length}</div><div class="stat-label">รายการทั้งหมด</div></div>
            <div class="stat rv d2"><div class="stat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div class="stat-num">฿${totalSpent.toLocaleString()}</div><div class="stat-label">ยอดซื้อทั้งหมด</div></div>
            <div class="stat rv d3"><div class="stat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div><div class="stat-num">฿${totalSaved.toLocaleString()}</div><div class="stat-label">ประหยัดไป</div></div>`;

        // Purchase list
        function render() {
            const wrap = document.getElementById('hContent');
            if (purchased.length === 0) {
                wrap.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><path d="M1 10h22"/></svg><p>ยังไม่มีประวัติการซื้อ</p><a href="courses.html">เลือกซื้อคอร์สเรียน →</a></div>`;
                return;
            }

            // Generate mock dates for purchases
            const mockDates = purchased.map((_, i) => {
                const d = new Date();
                d.setDate(d.getDate() - (i * 7 + Math.floor(Math.random() * 5)));
                return d;
            });

            let html = '<div class="h-list">';
            purchased.forEach((id, i) => {
                const c = COURSES[id];
                if (!c) return;
                const date = mockDates[i];
                const dateStr = date.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
                const timeStr = date.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                const discount = Math.round((1 - c.price / c.oldPrice) * 100);
                const orderId = 'ORD-' + (1000 + i * 137).toString().padStart(6, '0');

                html += `<div class="h-item rv" style="transition-delay:${i * 0.05}s">
                    <img class="h-thumb" src="${c.img}" alt="${c.title}" loading="lazy">
                    <div class="h-info">
                        <div class="h-title">${c.title}</div>
                        <div class="h-meta">
                            <span>${orderId}</span>
                            <span>${dateStr} ${timeStr}</span>
                            <span>${c.cat}</span>
                            <span>ส่วนลด ${discount}%</span>
                        </div>
                    </div>
                    <div class="h-amount">฿${c.price.toLocaleString()}</div>
                    <span class="h-status success">สำเร็จ</span>
                    <div class="h-actions">
                        <a href="course-detail.html?id=${c.id}" class="h-btn"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>ดูคอร์ส</a>
                        <a href="learning-player.html?id=${c.id}" class="h-btn"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>เรียน</a>
                    </div>
                </div>`;
            });
            html += '</div>';
            wrap.innerHTML = html;

            const obs = new IntersectionObserver(es => es.forEach(e => { if (e.isIntersecting) { e.target.classList.add('show'); obs.unobserve(e.target); } }), { threshold: .08 });
            document.querySelectorAll('.rv:not(.show)').forEach(el => obs.observe(el));
        }

        render();
        const obs = new IntersectionObserver(es => es.forEach(e => { if (e.isIntersecting) { e.target.classList.add('show'); obs.unobserve(e.target); } }), { threshold: .08 });
        document.querySelectorAll('.rv').forEach(el => obs.observe(el));
    </script>
</body>
</html>
