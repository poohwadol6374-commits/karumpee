<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Player | Better Day Agency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root,[data-theme="dark"]{--bg:#0a0a0a;--bg2:#111;--card:rgba(20,20,20,.85);--brd:rgba(255,255,255,.06);--brd2:rgba(255,255,255,.1);--tx:#f5f5f7;--tx2:#b0b0b5;--tx3:#6e6e73;--ac:#e63946;--ac-s:rgba(230,57,70,.1);--ac-g:rgba(230,57,70,.2);--green:#30d158;--orange:#ff9f0a;color-scheme:dark}
        [data-theme="light"]{--bg:#fff;--bg2:#f5f5f7;--card:rgba(255,255,255,.92);--brd:rgba(0,0,0,.06);--brd2:rgba(0,0,0,.1);--tx:#1a1a1a;--tx2:#555;--tx3:#999;--ac:#c1121f;--ac-s:rgba(193,18,31,.06);--ac-g:rgba(193,18,31,.12);--green:#2d8a4e;--orange:#d4700a;color-scheme:light}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter','Prompt',-apple-system,sans-serif;background:var(--bg);color:var(--tx);line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}
        a{color:inherit;text-decoration:none}h1,h2,h3{font-family:'Prompt',sans-serif;font-weight:600;letter-spacing:-.02em}

        /* Header */
        .lp-header{position:fixed;top:0;left:0;right:0;z-index:100;padding:.6rem 1.5rem;background:var(--bg);border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px);transition:background .4s}
        .lp-logo{font-family:'Prompt',sans-serif;font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:.4rem}
        .lp-logo .dot{color:var(--ac)}
        .lp-header-center{display:flex;align-items:center;gap:.75rem;flex:1;justify-content:center;max-width:500px}
        .lp-course-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .lp-prog-mini{flex:1;height:3px;background:var(--brd);border-radius:2px;min-width:80px;overflow:hidden}
        .lp-prog-mini-fill{height:100%;border-radius:2px;transition:width .5s ease}
        .lp-prog-pct{font-size:.7rem;color:var(--tx3);white-space:nowrap}
        .lp-header-right{display:flex;align-items:center;gap:.6rem}
        .lp-btn{padding:.35rem .8rem;border-radius:10px;border:1px solid var(--brd);background:transparent;color:var(--tx2);font-family:inherit;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:.3rem}
        .lp-btn:hover{background:var(--ac-s);border-color:var(--ac);color:var(--ac)}
        .lp-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
        .theme-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--brd);background:var(--card);color:var(--tx2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s}
        .theme-btn:hover{background:var(--ac-s);color:var(--ac);border-color:var(--ac)}
        [data-theme="dark"] .ic-sun{display:block}[data-theme="dark"] .ic-moon{display:none}
        [data-theme="light"] .ic-sun{display:none}[data-theme="light"] .ic-moon{display:block}

        /* Layout */
        .lp-wrap{display:flex;margin-top:52px;min-height:calc(100vh - 52px)}

        /* Sidebar */
        .lp-side{width:320px;background:var(--bg);border-right:1px solid var(--brd);position:fixed;top:52px;bottom:0;overflow-y:auto;padding:1.25rem;transition:background .4s}
        .lp-side-title{font-size:.75rem;letter-spacing:2px;color:var(--tx3);text-transform:uppercase;margin-bottom:1rem;font-weight:500}
        .lp-module{margin-bottom:.5rem}
        .lp-mod-head{display:flex;align-items:center;gap:.6rem;padding:.6rem .75rem;border-radius:10px;cursor:pointer;font-size:.82rem;font-weight:500;color:var(--tx2);transition:all .25s;user-select:none}
        .lp-mod-head:hover{background:var(--ac-s);color:var(--tx)}
        .lp-mod-head.active{color:var(--ac);font-weight:600}
        .lp-mod-num{width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0;border:1.5px solid var(--brd);transition:all .3s}
        .lp-mod-head.active .lp-mod-num{border-color:var(--ac);color:var(--ac)}
        .lp-mod-head.done .lp-mod-num{background:var(--green);border-color:var(--green);color:#fff}
        .lp-mod-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .lp-mod-dur{font-size:.65rem;color:var(--tx3);white-space:nowrap}
        .lp-lessons{padding-left:2.5rem;margin-top:.25rem;display:none}
        .lp-module.open .lp-lessons{display:block}
        .lp-lesson{display:flex;align-items:center;gap:.5rem;padding:.4rem .6rem;border-radius:8px;font-size:.78rem;color:var(--tx3);cursor:pointer;transition:all .2s}
        .lp-lesson:hover{background:rgba(255,255,255,.03);color:var(--tx2)}
        .lp-lesson.active{color:var(--ac);font-weight:600}
        .lp-lesson.done{color:var(--green)}
        .lp-lesson-icon{width:14px;height:14px;flex-shrink:0}
        .lp-lesson-icon svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

        /* Main content */
        .lp-main{flex:1;margin-left:320px;padding:2rem 3rem 4rem;max-width:860px}

        /* Video placeholder */
        .lp-video{aspect-ratio:16/9;border-radius:16px;overflow:hidden;position:relative;margin-bottom:2rem;cursor:pointer;transition:all .4s}
        .lp-video:hover{box-shadow:0 12px 40px rgba(0,0,0,.3)}
        .lp-video img{width:100%;height:100%;object-fit:cover}
        .lp-video-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.5rem;transition:background .3s}
        .lp-video:hover .lp-video-overlay{background:rgba(0,0,0,.1)}
        .lp-play{width:64px;height:64px;border-radius:50%;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;transition:transform .3s}
        .lp-video:hover .lp-play{transform:scale(1.1)}

        /* Lesson content */
        .lp-lesson-title{font-size:1.5rem;margin-bottom:.5rem}
        .lp-lesson-meta{font-size:.82rem;color:var(--tx3);margin-bottom:1.5rem;display:flex;gap:1rem;flex-wrap:wrap}
        .lp-content{font-size:.95rem;color:var(--tx2);line-height:1.8;margin-bottom:2rem}
        .lp-content h3{color:var(--tx);margin:1.5rem 0 .75rem;font-size:1.1rem}
        .lp-content ul{padding-left:1.25rem;margin:.75rem 0}
        .lp-content li{margin-bottom:.4rem}
        .lp-content .highlight{background:var(--ac-s);border-left:3px solid var(--ac);padding:.75rem 1rem;border-radius:0 10px 10px 0;margin:1rem 0;font-size:.9rem}

        /* Navigation */
        .lp-nav{display:flex;justify-content:space-between;align-items:center;padding-top:1.5rem;border-top:1px solid var(--brd);margin-top:2rem}
        .lp-nav-btn{padding:.65rem 1.5rem;border-radius:12px;border:1px solid var(--brd);background:transparent;color:var(--tx2);font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:.4rem}
        .lp-nav-btn:hover{background:var(--ac-s);border-color:var(--ac);color:var(--ac)}
        .lp-nav-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
        .lp-nav-btn.primary{background:var(--ac);color:#fff;border-color:var(--ac);box-shadow:0 0 12px var(--ac-g)}
        .lp-nav-btn.primary:hover{opacity:.9}
        .lp-complete-btn{padding:.65rem 1.5rem;border-radius:12px;border:none;font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:.4rem}
        .lp-complete-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5}

        /* Quiz */
        .quiz-wrap{background:var(--card);border:1px solid var(--brd);border-radius:20px;padding:2rem;margin:2rem 0}
        .quiz-title{font-size:1.1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
        .quiz-title svg{width:20px;height:20px;fill:none;stroke-width:2}
        .quiz-q{font-size:1rem;margin-bottom:1.25rem;line-height:1.6}
        .quiz-opts{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.5rem}
        .quiz-opt{padding:.75rem 1rem;border:1px solid var(--brd);border-radius:12px;cursor:pointer;font-size:.9rem;transition:all .3s;display:flex;align-items:center;gap:.6rem}
        .quiz-opt:hover{border-color:var(--brd2);background:rgba(255,255,255,.02)}
        .quiz-opt.selected{border-color:var(--ac);background:var(--ac-s)}
        .quiz-opt.correct{border-color:var(--green);background:rgba(48,209,88,.1);color:var(--green)}
        .quiz-opt.wrong{border-color:#e63946;background:rgba(230,57,70,.1);color:#e63946}
        .quiz-opt-letter{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;transition:all .3s}
        .quiz-opt.selected .quiz-opt-letter{border-color:var(--ac);color:var(--ac)}
        .quiz-opt.correct .quiz-opt-letter{border-color:var(--green);background:var(--green);color:#fff}
        .quiz-opt.wrong .quiz-opt-letter{border-color:#e63946;background:#e63946;color:#fff}
        .quiz-submit{padding:.65rem 2rem;border-radius:12px;border:none;font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .3s}
        .quiz-result{padding:1rem;border-radius:12px;margin-top:1rem;font-size:.9rem;font-weight:500;display:none}
        .quiz-result.correct{background:rgba(48,209,88,.1);color:var(--green);border:1px solid rgba(48,209,88,.2);display:block}
        .quiz-result.wrong{background:rgba(230,57,70,.1);color:#e63946;border:1px solid rgba(230,57,70,.2);display:block}

        /* ── Notes Panel ── */
        .notes-section{margin:2rem 0;border-top:1px solid var(--brd)}
        .notes-toggle{display:flex;align-items:center;gap:.5rem;padding:1rem 0;cursor:pointer;font-size:.9rem;font-weight:600;color:var(--tx2);transition:color .2s;user-select:none}
        .notes-toggle:hover{color:var(--tx)}
        .notes-toggle svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;transition:transform .3s}
        .notes-toggle.open svg{transform:rotate(180deg)}
        .notes-toggle .note-count{font-size:.7rem;font-weight:700;padding:.1rem .45rem;border-radius:980px;background:var(--ac-s);color:var(--ac);margin-left:.25rem}

        .notes-panel{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.16,1,.3,1)}
        .notes-panel.open{max-height:800px}

        .note-editor{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:1.25rem;margin-bottom:1rem;transition:border-color .3s}
        .note-editor:focus-within{border-color:var(--ac)}
        .note-editor-label{font-size:.75rem;font-weight:500;color:var(--tx3);margin-bottom:.5rem;display:flex;align-items:center;gap:.35rem}
        .note-editor-label svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
        .note-textarea{width:100%;min-height:100px;background:transparent;border:none;color:var(--tx);font-family:inherit;font-size:.88rem;line-height:1.7;resize:vertical;outline:none}
        .note-textarea::placeholder{color:var(--tx3)}
        .note-footer{display:flex;justify-content:space-between;align-items:center;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--brd)}
        .note-save-status{font-size:.72rem;color:var(--tx3);display:flex;align-items:center;gap:.3rem;transition:color .3s}
        .note-save-status.saved{color:var(--green)}
        .note-save-status svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5}
        .note-actions{display:flex;gap:.4rem}
        .note-btn{padding:.35rem .75rem;border-radius:10px;border:1px solid var(--brd);background:transparent;color:var(--tx2);font-family:inherit;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:.3rem}
        .note-btn:hover{background:var(--ac-s);border-color:var(--ac);color:var(--ac)}
        .note-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
        .note-btn.delete:hover{background:rgba(230,57,70,.08);border-color:#e63946;color:#e63946}

        /* All notes list */
        .notes-list{margin-top:.75rem}
        .notes-list-title{font-size:.8rem;font-weight:600;color:var(--tx3);margin-bottom:.75rem;display:flex;align-items:center;gap:.35rem}
        .note-item{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:1rem;margin-bottom:.5rem;cursor:pointer;transition:all .3s}
        .note-item:hover{border-color:var(--brd2);transform:translateX(4px)}
        .note-item-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem}
        .note-item-lesson{font-size:.78rem;font-weight:600;color:var(--tx)}
        .note-item-date{font-size:.65rem;color:var(--tx3)}
        .note-item-text{font-size:.82rem;color:var(--tx2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

        /* Complete overlay */
        .lp-complete{display:none;text-align:center;padding:4rem 2rem}
        .lp-complete.show{display:block}
        .lp-complete-icon{width:80px;height:80px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1.5rem;animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
        .lp-complete-icon svg{width:36px;height:36px;fill:none;stroke-width:2.5}
        @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
        .lp-complete h2{font-size:1.6rem;margin-bottom:.5rem}
        .lp-complete p{color:var(--tx2);margin-bottom:2rem;line-height:1.7}
        .lp-complete a{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 2rem;border-radius:980px;font-weight:600;transition:all .3s;text-decoration:none}

        .rv{opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease}.rv.show{opacity:1;transform:translateY(0)}

        @media(max-width:900px){.lp-side{display:none}.lp-main{margin-left:0;padding:1.5rem 1.25rem 3rem}.lp-header-center{display:none}}
        ::selection{background:var(--ac-g);color:#fff}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}
    </style>
</head>
<body>
    <div class="lp-header" id="lpHeader">
        <a href="my-courses.html" class="lp-logo"><svg width="22" height="22" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="8" fill="url(#lpLG)"/><path d="M8 14L12 18L20 10" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="lpLG" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#e63946"/><stop offset="1" stop-color="#c1121f"/></linearGradient></defs></svg>BetterDay<span class="dot">.</span></a>
        <div class="lp-header-center"><span class="lp-course-name" id="headerName"></span><div class="lp-prog-mini"><div class="lp-prog-mini-fill" id="headerProg"></div></div><span class="lp-prog-pct" id="headerPct"></span></div>
        <div class="lp-header-right">
            <a href="my-courses.html" class="lp-btn"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>กลับ</a>
            <button class="theme-btn" onclick="toggleTheme()"><svg class="ic-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg><svg class="ic-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        </div>
    </div>

    <div class="lp-wrap">
        <aside class="lp-side" id="lpSide"></aside>
        <main class="lp-main" id="lpMain"></main>
    </div>

    <script src="course-data.js"></script>
    <script>
        const root = document.documentElement;
        root.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
        function toggleTheme(){const n=root.getAttribute('data-theme')==='dark'?'light':'dark';root.setAttribute('data-theme',n);localStorage.setItem('theme',n)}

        const courseId = new URLSearchParams(location.search).get('id') || 'brand-building';
        const course = COURSES[courseId];
        if (!course) { document.getElementById('lpMain').innerHTML = '<div style="text-align:center;padding:6rem 2rem"><h2>ไม่พบคอร์ส</h2><a href="my-courses.html" style="color:var(--ac)">กลับไปหน้าคอร์ส</a></div>'; }

        const colors = COURSE_COLORS[courseId] || { primary: '#e63946', gradient: '' };
        const quizzes = QUIZZES[courseId] || [];
        let progress = getLessonProgress(courseId);
        let allLessons = [];
        course.curriculum.forEach((m, mi) => m.lessons.forEach((l, li) => allLessons.push({ moduleIdx: mi, lessonIdx: li, title: l, module: m })));
        let currentIdx = progress.current || 0;

        // Set accent color
        document.documentElement.style.setProperty('--ac', colors.primary);
        document.documentElement.style.setProperty('--ac-s', colors.primary + '18');
        document.documentElement.style.setProperty('--ac-g', colors.primary + '33');

        // Header
        document.getElementById('headerName').textContent = course.title;
        document.title = course.title + ' | Learning Player';

        function updateProgress() {
            const pct = Math.round((progress.completed.length / allLessons.length) * 100);
            document.getElementById('headerProg').style.width = pct + '%';
            document.getElementById('headerProg').style.background = colors.primary;
            document.getElementById('headerPct').textContent = pct + '%';
        }

        // Sidebar
        function renderSidebar() {
            let html = `<div class="lp-side-title">${course.cat} • ${course.modules} Modules</div>`;
            course.curriculum.forEach((m, mi) => {
                const isOpen = allLessons[currentIdx]?.moduleIdx === mi;
                const allDone = m.lessons.every((_, li) => progress.completed.includes(mi + '-' + li));
                html += `<div class="lp-module${isOpen ? ' open' : ''}">
                    <div class="lp-mod-head${isOpen ? ' active' : ''}${allDone ? ' done' : ''}" onclick="this.parentElement.classList.toggle('open')">
                        <span class="lp-mod-num">${allDone ? '✓' : mi + 1}</span>
                        <span class="lp-mod-title">${m.title.replace(/Module \d+: ?/, '')}</span>
                        <span class="lp-mod-dur">${m.dur}</span>
                    </div>
                    <div class="lp-lessons">`;
                m.lessons.forEach((l, li) => {
                    const idx = allLessons.findIndex(x => x.moduleIdx === mi && x.lessonIdx === li);
                    const isDone = progress.completed.includes(mi + '-' + li);
                    const isActive = idx === currentIdx;
                    html += `<div class="lp-lesson${isActive ? ' active' : ''}${isDone ? ' done' : ''}" onclick="goTo(${idx})">
                        <span class="lp-lesson-icon"><svg viewBox="0 0 24 24">${isDone ? '<polyline points="20 6 9 17 4 12"/>' : '<polygon points="5 3 19 12 5 21 5 3"/>'}</svg></span>
                        ${l}
                    </div>`;
                });
                html += '</div></div>';
            });
            document.getElementById('lpSide').innerHTML = html;
        }

        // Main content
        function renderLesson() {
            if (currentIdx >= allLessons.length) { renderComplete(); return; }
            const lesson = allLessons[currentIdx];
            const mi = lesson.moduleIdx, li = lesson.lessonIdx;
            const key = mi + '-' + li;
            const isDone = progress.completed.includes(key);
            const quiz = quizzes.find(q => q.module === mi && li === lesson.module.lessons.length - 1);

            let html = `<div class="rv show">
                <div class="lp-video" style="background:${colors.gradient || 'var(--card)'}">
                    <img src="${course.img}" alt="${course.title}" style="opacity:.4">
                    <div class="lp-video-overlay" style="background:rgba(0,0,0,.3)">
                        <div class="lp-play" style="background:${colors.primary}33;border-color:${colors.primary}44"><svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></div>
                        <span style="font-size:.8rem;color:rgba(255,255,255,.7)">${lesson.module.title} — ${lesson.module.dur}</span>
                    </div>
                </div>
                <h1 class="lp-lesson-title">${lesson.title}</h1>
                <div class="lp-lesson-meta">
                    <span>${course.cat}</span>
                    <span>${lesson.module.title}</span>
                    <span>บทที่ ${currentIdx + 1} จาก ${allLessons.length}</span>
                </div>
                <div class="lp-content">
                    <p>ในบทเรียนนี้คุณจะได้เรียนรู้เกี่ยวกับ <strong>${lesson.title}</strong> ซึ่งเป็นส่วนสำคัญของ ${lesson.module.title}</p>
                    <div class="highlight">💡 <strong>Key Takeaway:</strong> ${lesson.title} เป็นทักษะที่สำคัญสำหรับ${course.cat} ที่จะช่วยให้คุณสามารถนำไปประยุกต์ใช้กับธุรกิจได้ทันที</div>
                    <h3>สิ่งที่จะได้เรียนรู้</h3>
                    <ul>
                        <li>ทฤษฎีและหลักการของ ${lesson.title.replace(/^\d+\.\d+ /, '')}</li>
                        <li>ตัวอย่างจากแบรนด์จริงที่ประสบความสำเร็จ</li>
                        <li>Workshop: ลงมือทำจริงกับธุรกิจของคุณ</li>
                        <li>เทคนิคและเครื่องมือที่ใช้ในอุตสาหกรรม</li>
                    </ul>
                    <h3>สรุปบทเรียน</h3>
                    <p>หลังจากเรียนบทนี้จบ คุณจะสามารถนำความรู้เรื่อง ${lesson.title.replace(/^\d+\.\d+ /, '')} ไปใช้กับงาน${course.cat}ของคุณได้ทันที ลองทำ Workshop และทบทวนเนื้อหาอีกครั้งเพื่อความเข้าใจที่ลึกซึ้งยิ่งขึ้น</p>
                </div>`;

            // Quiz at end of module
            if (quiz) {
                html += `<div class="quiz-wrap" id="quizWrap">
                    <div class="quiz-title"><svg viewBox="0 0 24 24" stroke="${colors.primary}"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>แบบทดสอบท้ายบท</div>
                    <p class="quiz-q">${quiz.q}</p>
                    <div class="quiz-opts" id="quizOpts">
                        ${quiz.opts.map((o, i) => `<div class="quiz-opt" data-idx="${i}" onclick="selectOpt(this)"><span class="quiz-opt-letter">${'ABCD'[i]}</span>${o}</div>`).join('')}
                    </div>
                    <button class="quiz-submit" style="background:${colors.primary};color:#fff" onclick="submitQuiz(${quiz.ans})">ตรวจคำตอบ</button>
                    <div class="quiz-result" id="quizResult"></div>
                </div>`;
            }

            // Notes section
            var noteKey = mi + '-' + li;
            var existingNote = getNotes(courseId)[noteKey];
            var allCourseNotes = getAllNotes(courseId);
            var noteText = existingNote ? existingNote.text : '';

            html += '<div class="notes-section">';
            html += '<div class="notes-toggle" onclick="toggleNotes(this)"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>📝 บันทึกของฉัน';
            if (allCourseNotes.length > 0) html += '<span class="note-count">' + allCourseNotes.length + '</span>';
            html += '</div>';
            html += '<div class="notes-panel">';

            // Editor
            html += '<div class="note-editor">';
            html += '<div class="note-editor-label"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>จดบันทึกสำหรับบทนี้</div>';
            html += '<textarea class="note-textarea" id="noteText" placeholder="พิมพ์บันทึกของคุณที่นี่... เช่น สิ่งที่ได้เรียนรู้ ไอเดีย หรือสิ่งที่อยากจำ">' + noteText + '</textarea>';
            html += '<div class="note-footer">';
            html += '<span class="note-save-status" id="noteSaveStatus">' + (noteText ? '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>บันทึกแล้ว' : 'ยังไม่ได้บันทึก') + '</span>';
            html += '<div class="note-actions">';
            html += '<button class="note-btn" onclick="saveCurrentNote()"><svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>บันทึก</button>';
            if (noteText) html += '<button class="note-btn delete" onclick="deleteCurrentNote()"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>ลบ</button>';
            html += '</div></div></div>';

            // All notes for this course
            if (allCourseNotes.length > 0) {
                html += '<div class="notes-list">';
                html += '<div class="notes-list-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>บันทึกทั้งหมดในคอร์สนี้ (' + allCourseNotes.length + ')</div>';
                allCourseNotes.forEach(function(entry) {
                    var nKey = entry[0];
                    var nData = entry[1];
                    var parts = nKey.split('-');
                    var mIdx = parseInt(parts[0]);
                    var lIdx = parseInt(parts[1]);
                    var lessonName = '';
                    if (course.curriculum[mIdx] && course.curriculum[mIdx].lessons[lIdx]) {
                        lessonName = course.curriculum[mIdx].lessons[lIdx];
                    }
                    var isCurrentNote = nKey === noteKey;
                    html += '<div class="note-item' + (isCurrentNote ? ' style="border-color:var(--ac);background:var(--ac-s)"' : '') + '" onclick="goToNoteLesson(\'' + nKey + '\')">';
                    html += '<div class="note-item-head"><span class="note-item-lesson">' + (isCurrentNote ? '📌 ' : '') + lessonName + '</span><span class="note-item-date">' + nData.updated + '</span></div>';
                    html += '<div class="note-item-text">' + nData.text.substring(0, 120) + (nData.text.length > 120 ? '...' : '') + '</div>';
                    html += '</div>';
                });
                html += '</div>';
            }

            html += '</div></div>';

            // Navigation
            html += `<div class="lp-nav">
                ${currentIdx > 0 ? `<button class="lp-nav-btn" onclick="goTo(${currentIdx - 1})"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>บทก่อนหน้า</button>` : '<div></div>'}
                ${!isDone ? `<button class="lp-complete-btn" style="background:${colors.primary};color:#fff" onclick="markDone('${key}')"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>เรียนจบบทนี้</button>` : `<button class="lp-nav-btn primary" style="background:${colors.primary};border-color:${colors.primary}" onclick="goTo(${currentIdx + 1})">บทถัดไป<svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>`}
            </div></div>`;

            document.getElementById('lpMain').innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderComplete() {
            // Double check all lessons are done
            const allKeys = [];
            course.curriculum.forEach((m, mi) => m.lessons.forEach((_, li) => allKeys.push(mi + '-' + li)));
            const missing = allKeys.filter(k => !progress.completed.includes(k));
            if (missing.length > 0) {
                // Not all done — go to first incomplete lesson
                const parts = missing[0].split('-');
                let idx = 0;
                for (const l of allLessons) {
                    if (l.moduleIdx === parseInt(parts[0]) && l.lessonIdx === parseInt(parts[1])) break;
                    idx++;
                }
                document.getElementById('lpMain').innerHTML = `<div style="text-align:center;padding:4rem 2rem">
                    <div style="width:64px;height:64px;border-radius:50%;background:${colors.primary}18;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="${colors.primary}" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
                    </div>
                    <h2 style="margin-bottom:.5rem">ยังเรียนไม่ครบทุกบท</h2>
                    <p style="color:var(--tx2);margin-bottom:1.5rem">คุณยังเหลืออีก ${missing.length} บทที่ยังไม่ได้เรียน กรุณาเรียนให้ครบทุกบทก่อนจบคอร์ส</p>
                    <button onclick="goTo(${idx})" style="padding:.7rem 2rem;background:${colors.primary};color:#fff;border:none;border-radius:980px;font-family:inherit;font-size:.9rem;font-weight:600;cursor:pointer">ไปบทที่ยังไม่ได้เรียน →</button>
                </div>`;
                return;
            }
            completeCourse(courseId);
            setCompletionDate(courseId);
            document.getElementById('lpMain').innerHTML = `<div class="lp-complete show">
                <div class="lp-complete-icon" style="background:${colors.primary}18"><svg viewBox="0 0 24 24" stroke="${colors.primary}"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
                <h2>🎉 ยินดีด้วย! เรียนจบแล้ว</h2>
                <p>คุณเรียนจบ <strong>${course.title}</strong> ครบทุกบทแล้ว<br>ใบรับรองของคุณพร้อมแล้ว</p>
                <a href="certificates.html" style="background:${colors.primary};color:#fff;border-radius:980px">🏆 ดูใบรับรอง</a>
                <br><br>
                <a href="my-courses.html" style="color:${colors.primary};font-size:.9rem">← กลับไปหน้าคอร์สของฉัน</a>
            </div>`;
        }

        function goTo(idx) {
            if (idx >= allLessons.length) { renderComplete(); return; }
            currentIdx = idx;
            progress.current = idx;
            saveLessonProgress(courseId, progress);
            renderSidebar();
            renderLesson();
            updateProgress();
        }

        function markDone(key) {
            if (!progress.completed.includes(key)) progress.completed.push(key);
            saveLessonProgress(courseId, progress);
            // Check if ALL lessons are completed
            const allKeys = [];
            course.curriculum.forEach((m, mi) => m.lessons.forEach((_, li) => allKeys.push(mi + '-' + li)));
            const allDone = allKeys.every(k => progress.completed.includes(k));
            if (allDone) { goTo(allLessons.length); return; }
            goTo(currentIdx + 1);
        }

        let selectedOpt = null;
        function selectOpt(el) {
            document.querySelectorAll('.quiz-opt').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            selectedOpt = parseInt(el.dataset.idx);
        }
        function submitQuiz(correctIdx) {
            if (selectedOpt === null) return;
            const opts = document.querySelectorAll('.quiz-opt');
            opts.forEach(o => { o.style.pointerEvents = 'none'; });
            const result = document.getElementById('quizResult');
            if (selectedOpt === correctIdx) {
                opts[selectedOpt].classList.add('correct');
                result.className = 'quiz-result correct';
                result.textContent = '✅ ถูกต้อง! เยี่ยมมาก';
            } else {
                opts[selectedOpt].classList.add('wrong');
                opts[correctIdx].classList.add('correct');
                result.className = 'quiz-result wrong';
                result.textContent = '❌ ไม่ถูกต้อง — คำตอบที่ถูกคือ ' + 'ABCD'[correctIdx];
            }
        }

        // Notes functions
        var autoSaveTimer = null;

        function toggleNotes(el) {
            el.classList.toggle('open');
            el.nextElementSibling.classList.toggle('open');
        }

        function saveCurrentNote() {
            var text = document.getElementById('noteText').value;
            var lesson = allLessons[currentIdx];
            var key = lesson.moduleIdx + '-' + lesson.lessonIdx;
            saveNote(courseId, key, text);
            var status = document.getElementById('noteSaveStatus');
            status.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>บันทึกแล้ว';
            status.classList.add('saved');
            setTimeout(function() { status.classList.remove('saved'); }, 2000);
        }

        function deleteCurrentNote() {
            if (!confirm('ลบบันทึกนี้?')) return;
            var lesson = allLessons[currentIdx];
            var key = lesson.moduleIdx + '-' + lesson.lessonIdx;
            deleteNote(courseId, key);
            document.getElementById('noteText').value = '';
            var status = document.getElementById('noteSaveStatus');
            status.innerHTML = 'ลบแล้ว';
            // Re-render to update note list
            setTimeout(function() { renderLesson(); }, 500);
        }

        function goToNoteLesson(key) {
            var parts = key.split('-');
            var mi = parseInt(parts[0]), li = parseInt(parts[1]);
            var idx = allLessons.findIndex(function(x) { return x.moduleIdx === mi && x.lessonIdx === li; });
            if (idx >= 0) goTo(idx);
        }

        // Auto-save on typing
        document.addEventListener('input', function(e) {
            if (e.target.id === 'noteText') {
                clearTimeout(autoSaveTimer);
                var status = document.getElementById('noteSaveStatus');
                status.innerHTML = 'กำลังพิมพ์...';
                status.classList.remove('saved');
                autoSaveTimer = setTimeout(function() {
                    saveCurrentNote();
                }, 1500);
            }
        });

        // Init
        setLastVisit(); // Mark that user is learning
        renderSidebar();
        renderLesson();
        updateProgress();
    </script>
</body>
</html>
